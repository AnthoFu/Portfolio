
<section class="projects-hero">
  <div class="hero-content">
    <h1 class="page-title">Projects</h1>
    <div class="subtitle-box">
      <p>Open source projects I have worked on or maintained.</p>
    </div>
  </div>
</section>

<!-- Sections grouped by year -->
<div class="projects-by-year">
  <section 
    *ngFor="let group of groupedProjects; let i = index" 
    [class.bg-white]="i % 2 === 0" 
    [class.bg-blue]="i % 2 !== 0"
    class="year-section"
  >
    <div class="content">
      <h2 class="year-title">{{ group.year }}</h2>
      
      <div class="cards-container">
        <div class="project-card" *ngFor="let project of group.projects">
          
          <img [src]="project.images[0]" [alt]="project.title" class="card-image">

          <div class="card-content">
            <h3 class="card-title">{{ project.title }}</h3>
            <p class="card-description">{{ project.shortDescription }}</p>
            <a [routerLink]="['/projects', project.slug]" class="card-button">View Project</a>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
