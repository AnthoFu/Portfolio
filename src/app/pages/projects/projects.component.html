
<section class="projects-hero">
  <div class="hero-content">
    <h1 class="page-title">Projects</h1>
    <div class="subtitle-box">
      <p>Open source projects I have worked on or maintained.</p>
    </div>
  </div>
</section>

<section class="projects-showcase">
  <!-- Agregados eventos de swipe para sincronizar con los puntos de paginación -->
  <div class="cards-container" appSwipeable (swipeLeft)="onProjectSwipe('left')" (swipeRight)="onProjectSwipe('right')">
    <div class="card-slide" *ngFor="let project of projects; let i = index">
      <div class="project-card">
        
        <div class="main-image-container">
          <img [src]="project.images[project.selectedImageIndex]" alt="Project main image" class="main-image">
        </div>
        
        <div class="thumbnails-container">
          <div 
            class="thumbnail" 
            *ngFor="let img of project.images; let j = index"
            [class.active]="project.selectedImageIndex === j"
            (click)="selectImage(i, j)"
          >
            <div class="thumbnail-circle">
              <img [src]="img" alt="Project thumbnail">
            </div>
          </div>
        </div>

        <div class="card-content">
          <h3 class="project-title">{{ project.title }}</h3>
          <p class="project-description">{{ project.description }}</p>
          <a [routerLink]="['/projects', project.slug]" class="card-button">More information</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Puntos de paginación con el estilo sutil para fondo blanco -->
  <div class="pagination-dots">
    <div *ngFor="let dot of projects; let i = index" 
         class="dot" [class.active]="i === activeProjectSlide"></div>
  </div>
</section>
