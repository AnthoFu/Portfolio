<header class="header" [ngClass]="{'menu-open': isMenuOpen, 'scrolled': isScrolled, 'header-hidden': !isVisible}">
  <div class="hamburger-menu" (click)="toggleMenu()">
    <div class="line" [ngClass]="{'open': isMenuOpen}"></div>
    <div class="line" [ngClass]="{'open': isMenuOpen}"></div>
    <div class="line" [ngClass]="{'open': isMenuOpen}"></div>
  </div>

  <div class="top-logo">
    <img src="images/Anthofu_Icon.png" alt="AnthoFu Icon">
  </div>

  <nav class="desktop-nav">
    <ul class="nav-links-desktop">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">HOME</a></li>
      <li><a routerLink="/about" routerLinkActive="active">ABOUT ME</a></li>
      <li><a routerLink="/projects" routerLinkActive="active">PROJECTS</a></li>
    </ul>
  </nav>
</header>

<nav class="side-nav" [ngClass]="{'open': isMenuOpen}">
  <ul class="nav-links">
    <li>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">
        <i class="fa-solid fa-house"></i> HOME
      </a>
    </li>
    <li>
      <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">
        <i class="fa-solid fa-user"></i> ABOUT ME
      </a>
    </li>
    <li>
      <a routerLink="/projects" routerLinkActive="active" (click)="closeMenu()">
        <i class="fa-solid fa-code"></i> PROJECTS
      </a>
    </li>
  </ul>

  <div class="side-nav-footer">
    <div class="social-links">
      <a href="https://github.com/AnthoFu" target="_blank"><i class="fa-brands fa-github"></i></a>
      <a href="https://www.linkedin.com/in/anthofu/" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
      <a href="https://www.instagram.com/anthonyxa.fuentes/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
    </div>
    <p class="copyright">© 2026 AnthoFu</p>
  </div>
</nav>

<div class="overlay" *ngIf="isMenuOpen" (click)="closeMenu()"></div>

<div class="floating-contact">
  <a href="https://github.com/AnthoFu" target="_blank" class="contact-circle">
    <i class="fa-brands fa-github"></i>
  </a>
  <a href="https://www.linkedin.com/in/anthofu/" target="_blank" class="contact-circle">
    <i class="fa-brands fa-linkedin"></i>
  </a>
  <a href="https://www.instagram.com/anthonyxa.fuentes/" target="_blank" class="contact-circle">
    <i class="fa-brands fa-instagram"></i>
  </a>
</div>

<main>
  <router-outlet />
</main>

<app-footer></app-footer>
