<header class="header">
  <div class="hamburger-menu" (click)="toggleMenu()">
    <div class="line" [ngClass]="{'open': isMenuOpen}"></div>
    <div class="line" [ngClass]="{'open': isMenuOpen}"></div>
    <div class="line" [ngClass]="{'open': isMenuOpen}"></div>
  </div>

  <div class="top-logo">
    <img src="images/Anthofu_Icon.png" alt="AnthoFu Icon">
  </div>
</header>

<nav class="side-nav" [ngClass]="{'open': isMenuOpen}">
  <ul class="nav-links">
    <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">HOME</a></li>
    <li><a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">ABOUT ME</a></li>
    <li><a routerLink="/projects" routerLinkActive="active" (click)="closeMenu()">PROJECTS</a></li>
  </ul>
</nav>

<div class="overlay" *ngIf="isMenuOpen" (click)="closeMenu()"></div>

<div class="floating-contact">
  <a href="https://github.com/AnthoFu" target="_blank" class="contact-circle">
    <i class="fa-brands fa-github"></i>
  </a>
  <a href="https://www.linkedin.com/in/anthofu/" target="_blank" class="contact-circle">
    <i class="fa-brands fa-linkedin"></i>
  </a>
  <a href="https://www.instagram.com/anthonyxa.fuentes/" target="_blank" class="contact-circle">
    <i class="fa-brands fa-instagram"></i>
  </a>
</div>

<main>
  <router-outlet />
</main>

<app-footer></app-footer>
